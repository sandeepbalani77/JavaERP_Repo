spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    username: sa
    password:
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect

  flyway:
    enabled: true
    locations: classpath:db/testmigration
    baseline-on-migrate: true

app:
  jwt:
    secret: test-secret-key-for-jwt-token-generation-minimum-256-bits-long-key-testing
    expiration-ms: 3600000
    refresh-expiration-ms: 86400000
